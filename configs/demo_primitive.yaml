rope:
  length_m: 1.0
  n_segments: 32
  bend_stiffness: 1.0
  twist_stiffness: 1.0
  friction: 1.0
  radius: 0.005
sim:
  dt: 0.001
  substeps: 5
  rod_damping: 10.0
  rod_angular_damping: 5.0
  initial_settle_steps: 0
  reset_settle_max_steps: 25
  move_step_size: 0.03
  move_hold_steps: 0
  grasp_realism: true
primitive:
  count: 10
  p_low: 2
  p_high_margin: 2
  max_delta_m: 0.08
  lift_choices: [low, high]
outputs:
  stdout_log: outputs/reports/demo_primitive_stdout.log
  trajectory_png: outputs/plots/demo_primitive_trajectory.png
  meta_json: outputs/metrics/demo_primitive_meta.json
