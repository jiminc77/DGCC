# P1-M0 random-policy episode rollout demo (10 episodes).
sim:
  dt: 0.001
  substeps: 5
  rod_damping: 10.0
  rod_angular_damping: 5.0
  initial_settle_steps: 0
  reset_settle_max_steps: 10000  # settle-bearing: immutable P1 budget
  move_step_size: 0.03
  move_hold_steps: 0
  grasp_realism: true
demo:
  n_episodes: 10
actions:
  delta_min_m: 0.02
  delta_max_m: 0.15
  lift_choices: [low, high]
outputs:
  json: outputs/metrics/p1_rollout_demo.json
  stdout_log: outputs/reports/p1_rollout_demo.log
