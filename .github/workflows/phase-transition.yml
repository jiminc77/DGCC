# research-ops — 단계 자동 전환 (API 키 불필요)
# phase:P{k} 라벨의 open 이슈가 0이 되는 순간:
#   1) P{k+1} 킥오프 이슈 자동 생성 (본문 = 복붙용 오케스트레이터 킥오프 프롬프트, 값 채워짐)
#   2) ntfy 푸시 (이슈 링크 포함)
# 사람이 하는 일: 푸시 받고 → 이슈 열고 → 프롬프트 복사 → 새 오케스트레이터 세션에 붙여넣기. 끝.
#
# 선택 설정: 레포 Variables 에 MGMT_REPO (기본값 research-dashboard)
name: phase-transition

on:
  issues:
    types: [closed]

permissions:
  issues: write

jobs:
  kickoff:
    runs-on: ubuntu-latest
    steps:
      - name: detect phase completion & create kickoff
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          MGMT_REPO: ${{ vars.MGMT_REPO || 'research-dashboard' }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          # 닫힌 이슈의 phase 라벨
          PHASE=$(gh api "repos/$REPO/issues/$ISSUE_NUM" --jq '[.labels[].name|select(startswith("phase:"))][0] // empty')
          [ -z "$PHASE" ] && { echo "phase 라벨 없음 — 통과"; exit 0; }
          K="${PHASE#phase:P}"
          # 같은 phase 의 미결 이슈 수 (PR 제외)
          OPEN=$(gh api "repos/$REPO/issues?state=open&labels=$PHASE&per_page=100" --jq '[.[]|select(has("pull_request")|not)]|length')
          echo "P$K open=$OPEN"
          [ "$OPEN" -gt 0 ] && exit 0
          NEXT=$((K+1))
          # 멱등: 킥오프 이슈가 이미 있으면 통과
          DUP=$(gh issue list -R "$REPO" --state all --search "P${NEXT} 오케스트레이션 킥오프 in:title" --json number --jq length)
          [ "$DUP" -gt 0 ] && { echo "킥오프 이미 존재 — 통과"; exit 0; }
          # 다음 마일스톤이 없으면 프로젝트 종료 알림만
          HAS_NEXT=$(gh api "repos/$REPO/milestones?state=all&per_page=100" --jq "[.[]|select(.title|startswith(\"P${NEXT}\"))]|length")
          if [ "$HAS_NEXT" -eq 0 ]; then
            if [ -n "${NTFY_TOPIC:-}" ]; then
              curl -s -H "Title: 🏁 P${K} 완료 — 다음 마일스톤 없음" -H "Tags: checkered_flag" \
                -d "모든 단계가 끝났습니다. 종료 절차(ORCHESTRATOR STEP 6)를 검토하세요." \
                "ntfy.sh/${NTFY_TOPIC}" >/dev/null || true
            fi
            exit 0
          fi
          # 킥오프 이슈 본문 (복붙용 프롬프트)
          BODY_FILE=$(mktemp)
          {
          echo "## P${K} 완료 → P${NEXT} 킥오프"
          echo
          echo "아래 프롬프트를 **새 오케스트레이터 세션에 그대로 붙여넣으세요.**"
          echo
          echo '~~~text'
          echo "새 단계 오케스트레이션을 맡긴다. ${OWNER}/${MGMT_REPO} 의 research-ops/ORCHESTRATOR.md 와"
          echo "PROTOCOL.md, templates/ 를 읽고 그대로 따른다. STEP 0 self-check부터 시작(라벨·마일스톤은 이미 생성됨)."
          echo "- 구현 레포: ${REPO} · 관리 레포: ${OWNER}/${MGMT_REPO}"
          echo "- 단계: P${NEXT} (사전 등록 기준 문서가 있으면 반영)"
          echo "- P${NEXT}.md 작성: templates/phase_spec.md 뼈대. @goal 블록마다 Exit에 primary+guard 지표 사전등록,"
          echo "  HUMAN GATE는 class(hard/soft) 지정. 완료 후 CODE repo에 push."
          echo "- dev 이슈 생성: bash research-ops/scripts/setup_phase.sh P${NEXT} <P${NEXT}.md 경로>"
          echo "- gjc 위임 시 PROTOCOL 준수 명시: 착수 state:running, 게이트는 GATE REQUEST+state:blocked-human,"
          echo "  완료는 EVIDENCE(primary+guard) 후 CI VERIFIED ✅ 기다렸다 close, 진행은 PROGRESS 코멘트 편집."
          echo "  guard 이상치면 primary PASS여도 정지."
          echo '~~~'
          echo
          echo "오케스트레이터가 dev 이슈까지 만들면 이 이슈를 닫으세요. (gjc는 폴러가 자동 기상합니다)"
          } > "$BODY_FILE"
          URL=$(gh issue create -R "$REPO" \
            --title "[P${NEXT}] 오케스트레이션 킥오프 — 프롬프트 준비됨" \
            --body-file "$BODY_FILE" \
            --label "type:milestone,phase:P${NEXT}")
          echo "kickoff: $URL"
          if [ -n "${NTFY_TOPIC:-}" ]; then
            curl -s -H "Title: ✅ P${K} 완료 — P${NEXT} 킥오프 준비됨" -H "Priority: high" -H "Tags: rocket" \
              -d "킥오프 프롬프트 준비 완료. 복붙 한 번이면 시작: ${URL}" \
              "ntfy.sh/${NTFY_TOPIC}" >/dev/null || true
          fi
